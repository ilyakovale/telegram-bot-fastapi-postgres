services:
  init-templates:
    image: alpine
    volumes:
      - requests_templates:/target
      - ./requests_templates:/source
    command: cp -r /source/. /target/
  gateway_service:
    image: gateway_service:latest
    container_name: gs

    depends_on:
      - init-templates
    volumes:
     - requests_templates:/python-app/requests_templates

    networks:
     - app-network


  account_service:
    image: account_service:latest
    container_name: as

    depends_on:
      - init-templates
    volumes:
     - requests_templates:/python-app/requests_templates
    
    networks:
     - app-network
  
  postgres_db:
    image: postgres:17-alpine
    container_name: db

    environment:
      POSTGRES_USER: ${POSTGRES_USER}       
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
     - postgres-data:/var/lib/postgresql/data

    networks:
     - app-network


networks:
  app-network:
    driver: bridge

volumes:
  requests_templates:
  postgres-data: